name: Build and Push Docker Images
on: 
  push:
    branches:
      - main  # Only runs when you push to master

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Dynamically uses your username and repo name
          tags: |
            ghcr.io/${{ github.repository_owner }}/cod4x:latest
            ghcr.io/${{ github.repository_owner }}/cod4x:${{ github.run_number }}